name: Windows build

# Build a native Windows binary on every push and pull request so we catch
# Windows-specific breakage early. On version tags (v*) the binary is also
# attached to a GitHub Release.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel an in-progress run when newer commits land on the same ref.
concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    # Needed so the release step can create a Release and upload assets on tags.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # The MSVC toolchain ships with windows-latest, so rusqlite's bundled
      # SQLite (compiled from C source) builds without extra setup.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Cache the cargo registry and target dir keyed on Cargo.lock.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Test
        run: cargo test --release --locked --target x86_64-pc-windows-msvc

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-chooser-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/image-chooser.exe
          if-no-files-found: error

      # On a version tag, publish the executable as a release asset.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-pc-windows-msvc/release/image-chooser.exe
